name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME}
          cp android/app/build/outputs/apk/release/app-release.apk PriceNinja-${VERSION}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PriceNinja ${{ github.ref_name }}
          body: |
            ## PriceNinja ${{ github.ref_name }}

            ### Installation
            1. Lade die APK-Datei herunter
            2. Auf dem Android-Gerät öffnen und installieren
            3. Bei Bedarf "Unbekannte Quellen" in den Einstellungen erlauben

            ### Änderungen
            ${{ github.event.head_commit.message }}
          files: PriceNinja-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
