<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shuriken blades — transparent background, foreground only -->
  <g filter="url(#glow)">
    <polygon points="512,148 440,440 512,512 584,440"
             fill="#00ff88" opacity="0.95"/>
    <polygon points="876,512 584,440 512,512 584,584"
             fill="#00e5cc" opacity="0.95"/>
    <polygon points="512,876 584,584 512,512 440,584"
             fill="#00ff88" opacity="0.95"/>
    <polygon points="148,512 440,584 512,512 440,440"
             fill="#00e5cc" opacity="0.95"/>
  </g>

  <!-- Center dark circle -->
  <circle cx="512" cy="512" r="110" fill="#0a0b1e"/>
  <circle cx="512" cy="512" r="106" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.8"/>

  <!-- € symbol -->
  <text x="512" y="512"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="118"
        fill="#00ff88"
        text-anchor="middle"
        dominant-baseline="central"
        filter="url(#softglow)">€</text>
</svg>
