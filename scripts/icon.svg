<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0e2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060814;stop-opacity:1" />
    </linearGradient>
    <!-- Shuriken glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner glow -->
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="roundClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.06" stroke="#00ff88" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Outer ring glow -->
  <circle cx="512" cy="512" r="390" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.25"/>
  <circle cx="512" cy="512" r="380" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.15"/>

  <!-- Shuriken — 4 blades (rotated diamond shapes) with glow -->
  <g filter="url(#glow)">
    <!-- Blade 1: top-left → top-right pointing up -->
    <polygon points="512,148 440,440 512,512 584,440"
             fill="#00ff88" opacity="0.95"/>
    <!-- Blade 2: right (rotated 90°) -->
    <polygon points="876,512 584,440 512,512 584,584"
             fill="#00e5cc" opacity="0.95"/>
    <!-- Blade 3: bottom -->
    <polygon points="512,876 584,584 512,512 440,584"
             fill="#00ff88" opacity="0.95"/>
    <!-- Blade 4: left (rotated 270°) -->
    <polygon points="148,512 440,584 512,512 440,440"
             fill="#00e5cc" opacity="0.95"/>
  </g>

  <!-- Center hub — dark circle -->
  <circle cx="512" cy="512" r="112" fill="#0d0e2a" filter="url(#softglow)"/>
  <circle cx="512" cy="512" r="108" fill="#0a0b1e"/>

  <!-- Center ring accent -->
  <circle cx="512" cy="512" r="108" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.7"/>

  <!-- Price tag symbol in center -->
  <text x="512" y="512"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="118"
        fill="#00ff88"
        text-anchor="middle"
        dominant-baseline="central"
        filter="url(#softglow)">€</text>

  <!-- Corner accent dots -->
  <circle cx="180" cy="180" r="6" fill="#00ff88" opacity="0.4"/>
  <circle cx="844" cy="180" r="6" fill="#00ff88" opacity="0.4"/>
  <circle cx="180" cy="844" r="6" fill="#00ff88" opacity="0.4"/>
  <circle cx="844" cy="844" r="6" fill="#00ff88" opacity="0.4"/>
</svg>
